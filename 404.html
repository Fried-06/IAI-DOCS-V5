<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Introuvable - 404</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #040c18;
            --bg2: #07111f;
            --bg3: #0b1930;
            --border: #1e3558;
            --cyan: #00e5c4;
            --text: #c8ddf2;
            --muted: #4a6a8a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'DM Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, var(--bg3), var(--bg));
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Blueprint grid layout matching the main theme */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 229, 196, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 196, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        /* Particle / Stars animation */
        .stars {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: pulse 3s infinite ease-in-out;
        }

        .container {
            position: relative;
            text-align: center;
            padding: 3rem;
            max-width: 600px;
            background: rgba(7, 17, 31, 0.7);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 229, 196, 0.05);
            z-index: 2;
            animation: fadeIn 0.8s ease-out;
        }

        .glitch-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 9rem;
            line-height: 1;
            background: linear-gradient(135deg, #fff, var(--cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 229, 196, 0.3);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        p {
            font-size: 1rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--cyan);
            color: #000;
            padding: 0.9rem 2rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 0.08em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 229, 196, 0.2);
        }

        .btn:hover {
            background: #00fbd7;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 229, 196, 0.4);
        }

        .astronaut {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(8deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="stars" id="starsContainer"></div>

    <div class="container">
        <!-- Floating Astronaut SVG Icon -->
        <svg class="astronaut" viewBox="0 0 24 24" fill="none" stroke="#00e5c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 0 1 10 10c0 5.523-4.477 10-10 10S2 17.523 2 12A10 10 0 0 1 12 2z"/>
            <path d="M12 6a6 6 0 0 0-6 6c0 1.5.5 3 1.5 4"/>
            <circle cx="12" cy="12" r="3"/>
            <path d="M19 16c1-1 1.5-2.5 1.5-4a6 6 0 0 0-3.5-5.5"/>
        </svg>

        <div class="glitch-num">404</div>
        <h2>Perdu dans l'espace</h2>
        <p>
            Oups ! La ressource que vous essayez d'atteindre a dérivé hors de notre orbite ou n'a jamais existé.
        </p>
        <a href="index.html" class="btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Retour à l'accueil
        </a>
    </div>

    <script>
        // Generate random space stars
        const container = document.getElementById('starsContainer');
        const count = 50;
        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            container.appendChild(star);
        }
    </script>
</body>
</html>
