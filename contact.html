<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Ressources IAI</title>
    <link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body class="page-fade-in">
    <!-- Simple nav to replace full one for brevity in this single file -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo" style="padding: 0; display: flex; align-items: center;">
                <img src="assets/logoiai.png" alt="Logo IAI" style="height: 200px; width: auto; object-fit: contain;">
            </a>
            <div class="nav-links">
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-item">Accueil</a></li>
                    <li><a href="exams.html" class="nav-item">Examens</a></li>
                    <li><a href="search.html" class="nav-item">Rechercher</a></li>
                    <li><a href="contribute.html" class="nav-item">Contribuer</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="theme-toggle" id="theme-toggle" title="Basculer le thème" style="margin-right: 0.5rem;">
                        <!-- Moon icon default -->
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                    <a href="login.html" class="btn btn-outline" style="padding: 0.5rem 1rem; border: none;">Connexion</a>
                    <a href="login.html" class="btn btn-primary" style="padding: 0.5rem 1rem;">S'inscrire</a>
                    <!-- Profil is hidden by default, shown via JS if logged in -->
                    <a href="profile.html" class="btn btn-outline" id="btn-profil" style="display: none; padding: 0.5rem 1rem;">Profil</a>
                </div>
            </div>
            <button class="mobile-menu-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
    </nav>

    <main class="container" style="padding: 4rem 0;">
        <h1 style="text-align: center; color: var(--primary); margin-bottom: 1rem;">Contactez-nous</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 3rem;">Vous avez une question ou souhaitez signaler un problème ?</p>
        
        <div style="max-width: 500px; margin: 0 auto; background: var(--bg-card); padding: 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--border);">
            <form action="backend/contact.php" method="POST">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Votre Nom</label>
                    <input type="text" name="name" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none;">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Votre Email</label>
                    <input type="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none;">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Message</label>
                    <textarea name="message" rows="5" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Envoyer le Message</button>
            </form>
        </div>
    </main>
<script src="js/main.js"></script>
</body>
</html>
